name: "label"

on:
  pull_request_target: ~

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  content-label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v6
        with:
          sync-labels: true

  conventional-label:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: bcoe/conventional-release-labels@v1
        with:
          type_labels: |
            {
              "feat": "Feature",
              "fix": "Fix",
              "ci": "CI",
              "docs": "Docs",
              "refactor": "Refactor",
              "build": "Build"
            }
